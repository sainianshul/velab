<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      try {
        const savedTheme = localStorage.getItem("app-theme");
        const mode = savedTheme === "dark" ? "dark" : "light";

        const link = document.createElement("link");
        link.id = "theme-link";
        link.rel = "stylesheet";
        link.href = `/themes/lara-${mode}-blue/theme.css`;

        document.head.appendChild(link);
      } catch (e) {
        // fallback if localStorage fails (rare case)
        const link = document.createElement("link");
        link.id = "theme-link";
        link.rel = "stylesheet";
        link.href = "/themes/lara-light-blue/theme.css";
        document.head.appendChild(link);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>velab</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
